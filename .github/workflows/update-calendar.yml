name: Generate Abdel Calendar

on:
  schedule:
    - cron: '*/15 6-16 * * 1-5'  # every 15 min, 8-18 Brussels time, weekdays
  workflow_dispatch:       # also allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl requests

      - name: Generate ICS
        env:
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}        
        run: python generate_calendar.py

      - name: Commit and push updated ICS
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/abdel.ics
          git diff --cached --quiet || git commit -m "Update Abdel calendar $(date -u +%Y-%m-%d)"
          git push
